<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoVault — Coffre-fort de souvenirs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; scroll-behavior: smooth; cursor: default; }
        input, textarea, [contenteditable], select { cursor: text; }
        a, button, label, [onclick] { cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34,197,94,0.5); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
</head>
<body class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 antialiased transition-colors duration-300">
    <div id="app" class="min-h-screen">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <img src="logo.png" alt="ChronoVault" class="w-16 h-16 rounded-2xl mb-4 mx-auto animate-pulse">
                <h1 class="text-2xl font-bold mb-1">ChronoVault</h1>
                <p class="text-neutral-500 text-sm">Chargement...</p>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
